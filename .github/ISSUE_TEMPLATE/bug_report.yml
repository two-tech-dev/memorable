---
name: Bug Report
description: Report a bug in Memorable
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      placeholder: "1.22"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14 / Ubuntu 22.04 / Windows 11"

  - type: input
    id: pg-version
    attributes:
      label: PostgreSQL Version
      placeholder: "16"
